name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'feat/**', 'fix/**', 'hotfix/**', 'claude/**']

env:
  PNPM_VERSION: '9.1.0'
  NODE_VERSION: '20'

jobs:
  setup:
    name: Install + cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile=false

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -F @aria/middleware typecheck
      - run: pnpm -F @aria/config    exec tsc --noEmit
      - run: pnpm -F @aria/web       exec tsc --noEmit

  unit-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -F @aria/middleware test

  java-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven }
      - run: mvn -B -ntp -f apps/backend/pom.xml test

  anti-test-dodging:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - name: Identify changed test files
        id: diff
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then BASE="origin/main"; fi
          files=$(git diff --name-only "$BASE"...HEAD -- '**/*.test.ts' '**/*.spec.ts' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Run anti-test-dodging
        if: steps.diff.outputs.files != ''
        run: pnpm -F @aria/middleware exec tsx ../../tools/anti-test-dodging.ts ${{ steps.diff.outputs.files }}

  anti-slop:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - name: Identify changed UI files
        id: diff
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then BASE="origin/main"; fi
          files=$(git diff --name-only "$BASE"...HEAD -- '**/*.tsx' '**/*.css' '**/*.scss' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Run anti-slop gate
        if: steps.diff.outputs.files != ''
        run: pnpm -F @aria/middleware exec tsx ../../tools/anti-slop-gate.ts ${{ steps.diff.outputs.files }}

  e2e:
    needs: [typecheck, unit-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium-desktop, chromium-tablet, chromium-mobile]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: { POSTGRES_USER: aria, POSTGRES_PASSWORD: aria, POSTGRES_DB: aria_dev }
        ports: ['5432:5432']
        options: --health-cmd="pg_isready -U aria" --health-interval=5s --health-timeout=5s --health-retries=20
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm exec playwright install --with-deps chromium
      - name: Bring up stack
        run: |
          bash scripts/generate-keys.sh
          # NOTE: E2E job runs the stack via pnpm dev rather than docker-compose so CI doesn't depend on
          # docker-in-docker. Ollama-dependent tests skip when OLLAMA_BASE_URL is unreachable.
          pnpm -F @aria/middleware dev &
          pnpm -F @aria/web dev &
          sleep 15
      - run: pnpm -F @aria/e2e test --project=${{ matrix.project }}
