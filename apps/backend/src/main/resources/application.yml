spring:
  application:
    name: aria-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aria_dev}
    username: ${DB_USERNAME:aria}
    password: ${DB_PASSWORD:aria}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false  # Flyway managed by packages/db

server:
  port: ${BACKEND_PORT:8080}

aria:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.aria: INFO
    org.hibernate.SQL: WARN
