spring:
  application:
    name: aria-backend

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema, Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

server:
  port: ${BACKEND_PORT:8080}
  error:
    include-message: never        # Never leak stack traces to clients
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

aria:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}       # Base64-encoded RSA public key
  backend:
    middleware-url: ${MIDDLEWARE_URL:http://localhost:3001}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    default-model: ${OLLAMA_DEFAULT_MODEL:llama3}

logging:
  level:
    root: INFO
    com.aria: DEBUG
    org.springframework.security: WARN
    org.flywaydb: INFO
