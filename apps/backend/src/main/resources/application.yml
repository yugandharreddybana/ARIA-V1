spring:
  application:
    name: aria-backend
  datasource:
    # stringtype=unspecified lets Postgres infer the column type from JDBC text params —
    # required because existing JPA entities (AnalysisJob etc.) map UUID columns to Java String fields.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:aria_dev}?stringtype=unspecified}
    username: ${POSTGRES_USER:aria}
    password: ${POSTGRES_PASSWORD:aria}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${BACKEND_PORT:8080}

aria:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.aria: INFO
    org.hibernate.SQL: WARN
